name: Download Book Chapter

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      isbn:
        description: 'شابک (ISBN) کتاب (اختیاری - اگر داری اینو پر کن)'
        required: false
        default: ''
        type: string
      book_title:
        description: 'عنوان کتاب (اگر ISBN رو ندادی، اینو پر کن)'
        required: false
        default: 'fMRI Techniques and Protocols'
        type: string
      book_author:
        description: 'نام نویسنده یا ویراستار (برای جستجوی دقیق‌تر)'
        required: false
        default: 'Filippi'
        type: string

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install and Run Z-Library Downloader
        env:
          # ورودی‌های دستی کاربر رو می‌گیریم
          ISBN: ${{ github.event.inputs.isbn }}
          BOOK_TITLE: ${{ github.event.inputs.book_title }}
          BOOK_AUTHOR: ${{ github.event.inputs.book_author }}
        run: |
          pip install zlibrary-sync

          python -c "
          import os, sys
          from zlibrary import ZLibraryAPI, ZLibraryException, Extension

          ISBN = os.environ.get('ISBN', '').strip()
          BOOK_TITLE = os.environ.get('BOOK_TITLE', '').strip()
          BOOK_AUTHOR = os.environ.get('BOOK_AUTHOR', '').strip()
          DOWNLOAD_DIR = 'download'
          EXPECTED_EXTENSION = Extension.PDF

          # تصمیم‌گیری: با ISBN بگردیم یا عنوان؟
          if ISBN:
              search_query = ISBN
              print(f'جستجو با ISBN: {search_query}')
          elif BOOK_TITLE:
              search_query = f'{BOOK_TITLE} {BOOK_AUTHOR}'.strip()
              print(f'جستجو با عنوان: {search_query}')
          else:
              print('خطا: یا ISBN یا عنوان کتاب را وارد کنید.')
              sys.exit(1)

          api = ZLibraryAPI(use_cache=False)

          try:
              results = api.search(
                  query=search_query,
                  extensions=[EXPECTED_EXTENSION]
              )

              if not results:
                  print('هیچ کتابی پیدا نشد.')
                  sys.exit(0)

              print(f'تعداد {len(results)} نتیجه پیدا شد.')
              for book_result in results:
                  details = api.get_book_details(book_result.url)
                  if not details.download_url or details.download_url == 'CONVERSION_NEEDED':
                      print(f'  نادیده گرفته شد: {details.title}')
                      continue

                  print(f'  دانلود: {details.title} ({details.year})')
                  os.makedirs(DOWNLOAD_DIR, exist_ok=True)
                  filepath = api.download(details, download_url=details.download_url, download_dir=DOWNLOAD_DIR)
                  print(f'  فایل در {filepath} ذخیره شد.')
                  sys.exit(0)

              print('هیچ کتابی با لینک دانلود مستقیم پیدا نشد.')

          except ZLibraryException as e:
              print(f'خطا در Z-Library: {e}')
              sys.exit(1)
          except Exception as e:
              print(f'خطای غیرمنتظره: {e}')
              sys.exit(1)
          "
      - name: Commit and push if new file
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add download/ || true
          git diff --staged --quiet || git commit -m "دانلود خودکار کتاب با ISBN"
          git push
